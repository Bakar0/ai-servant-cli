name: Release

# Cutting a release is plain git: `git tag v0.2.0 && git push --tags`. This builds a
# standalone binary per platform, publishes a GitHub Release with the binaries + sha256
# sums, and bumps the Homebrew tap formula. PRs are handled by ci.yml.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            asset: servant-darwin-arm64
          - target: bun-darwin-x64
            asset: servant-darwin-x64
          - target: bun-linux-x64
            asset: servant-linux-x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so `git describe` stamps the version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate embedded manifest + version
        run: bun run gen:templates && bun run gen:version

      - name: Build ${{ matrix.target }}
        run: bun build --compile --target=${{ matrix.target }} src/index.ts --outfile dist/servant

      - name: Package + checksum
        working-directory: dist
        run: |
          tar -czf "${{ matrix.asset }}.tar.gz" servant
          shasum -a 256 "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.tar.gz.sha256
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/*/*.tar.gz artifacts/*/*.tar.gz.sha256

  bump-formula:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew formula bump. See README → Distribution."
          fi

      - name: Checkout ai-servant-cli (for scripts)
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: steps.gate.outputs.enabled == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download all artifacts
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout tap repo
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: Bakar0/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render + commit formula
        if: steps.gate.outputs.enabled == 'true'
        run: |
          mkdir -p tap/Formula
          bun run scripts/gen-formula.ts "${GITHUB_REF_NAME}" artifacts > tap/Formula/servant.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/servant.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "servant ${GITHUB_REF_NAME}"
            git push
          fi
